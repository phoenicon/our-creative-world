name: Deploy to Hostinger

# Enabled by setting the repository variable DEPLOY_HOSTINGER to "true"
# (Settings → Secrets and variables → Actions → Variables) after adding
# the FTP_SERVER / FTP_USERNAME / FTP_PASSWORD secrets from hPanel.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ vars.DEPLOY_HOSTINGER == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (served from domain root on Hostinger)
        run: npm run build
      - name: Upload dist/ over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ vars.HOSTINGER_DIR || 'public_html/' }}
